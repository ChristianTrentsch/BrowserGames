<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Fang das Alien!</title>
    <link rel="icon" href="./images/space_alien.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body class="bg-dark text-light">
    <div class="container py-5 text-center">

      <!-- Titel -->
      <h1 class="display-4 fw-bold text-neon mb-3 d-flex align-items-center justify-content-center flex-wrap gap-2">
        <img src="./images/space_alien.png" alt="Alien" style="height: 70px" />
        Fang das Alien!
      </h1>

      <!-- Beschreibung -->
      <div class="mb-4 p-3 bg-gradient text-light rounded-3 shadow-lg mx-auto" style="max-width: 600px">
        <p>
          Treffe das Alien, bevor die Zeit von 20 Sekunden abläuft.<br />
          Jeder Treffer macht es schneller, setzt den Timer zurück und spielt
          einen Sound. Bei 7 Sekunden ertönt eine Warnung,
          <b>jetzt heißt es schnell sein!</b>
        </p>
      </div>

      <!-- Punkte und Zeit -->
      <div class="mb-3">
        <span class="fs-4">Punkte:</span>
        <span id="score" class="badge bg-info fs-4">0</span>
        <span class="ms-4 fs-4">Zeit:</span>
        <span id="timer" class="badge bg-warning fs-4">20</span>
        <span class="ms-1 fs-4">sek.</span>
      </div>

      <!-- Start- und Reset-Buttons -->
      <div class="mb-4">
        <button id="startButton" class="btn btn-info btn-lg">Neues Spiel</button>
        <button hidden id="resetButton" class="btn btn-danger btn-lg">Reset Highscore</button>
      </div>

      <!-- Startseite -->
      <div class="mb-4">
        <a href="../index.html" class="btn btn-outline-info btn-lg">
          🎮 Zurück zur Startseite
        </a>
      </div>

      <!-- Spielbereich -->
      <div class="card bg-secondary shadow-lg rounded-4 p-3 mx-auto" style="max-width: 450px">
        <canvas id="game" width="400" height="400" class="mx-auto d-block"></canvas>
      </div>

      <!-- Highscore -->
      <div class="mt-4">
        <h3>Highscore</h3>
        <table class="table table-dark table-striped w-50 mx-auto" id="highscoreTable">
          <thead>
            <tr>
              <th>Platz</th>
              <th>Name</th>
              <th>Punkte</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script>
      const score_display = document.getElementById("score");
      const timer_display = document.getElementById("timer");
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      // Soundeffekte
      const hitSound = new Audio("./sounds/hit.mp3");
      hitSound.volume = 0.5;
      hitSound.preload = "auto";
      hitSound.load();

      const warningSound = new Audio("./sounds/countdown.mp3");
      warningSound.volume = 0.5;

      // Warnung bei exakt diesem Zeitwert starten (Sekunden)
      // Wird nach dem Laden des Sounds automatisch gesetzt
      let warnAtTime = 3.552; // Fallback falls Sound nicht lädt

      warningSound.addEventListener("loadedmetadata", () => {
        // warten bis sound geladen , dann dauer ermitteln
        warnAtTime = warningSound.duration;
      });

      let warningPlayed = false;

      // Spielzustand
      let x = 100, y = 100, score = 0;
      let dx = 1.5, dy = 1.5;
      let timeLeft = 20;
      let gameRunning = false;
      let clicked = false;

      // Zeitstempel für deltaTime-basierte Bewegung
      let lastTimestamp = null;

      // Alien-Bild
      const img = new Image();
      img.src = "./images/space_alien.png";

      function resetTimer() { timeLeft = 20; }

      function resetSound() {
        warningPlayed = false;
        warningSound.pause();
        warningSound.currentTime = 0;
        hitSound.pause();
        hitSound.currentTime = 0;
      }

      function resetSpeed() { dx = 1.5; dy = 1.5; }

      function drawAlien() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img.complete) {
          if (clicked) {
            ctx.drawImage(img, x - 35, y - 35, 70, 70);
          } else {
            ctx.drawImage(img, x - 20, y - 20, 40, 40);
          }
        }
      }

      // deltaTime in Sekunden → Bewegung ist unabhängig von der Framerate
      function updatePosition(delta) {
        const move = delta * 60; // normiert auf 60fps-Basis
        x += dx * move;
        y += dy * move;
        if (x < 20 || x > canvas.width - 20) dx = -dx;
        if (y < 20 || y > canvas.height - 20) dy = -dy;
      }

      function updateTimer(delta) {
        timeLeft -= delta;
        timer_display.textContent = Math.max(timeLeft, 0).toFixed(1);

        if (!warningPlayed && timeLeft <= warnAtTime) {
          warningSound.play();
          warningPlayed = true;
        }

        if (timeLeft <= 0) gameOver();
      }

      function gameOver() {
        gameRunning = false;
        lastTimestamp = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let name = prompt(`Game Over! Punkte: ${score}\nGib deinen Namen ein (3 Buchstaben):`) || "???";
        name = name.substring(0, 3).toUpperCase();
        saveHighscore(name, score);
        loadHighscores();
      }

      function saveHighscore(name, points) {
        let scores = JSON.parse(localStorage.getItem("alienHighscores")) || [];
        scores.push({ name, points });
        scores.sort((a, b) => b.points - a.points);
        scores = scores.slice(0, 10);
        localStorage.setItem("alienHighscores", JSON.stringify(scores));
      }

      function loadHighscores() {
        const tableBody = document.querySelector("#highscoreTable tbody");
        tableBody.innerHTML = "";
        let scores = JSON.parse(localStorage.getItem("alienHighscores")) || [];
        scores.forEach((entry, index) => {
          tableBody.innerHTML += `<tr><td>${index + 1}</td><td>${entry.name}</td><td>${entry.points}</td></tr>`;
        });
      }

      // Koordinaten auf interne Canvas-Auflösung umrechnen (CSS-Skalierung ausgleichen)
      function getCanvasCoords(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }

      // Hit-Logik zentral
      function handleHit(clientX, clientY) {
        if (!gameRunning) return;
        const { x: cx, y: cy } = getCanvasCoords(clientX, clientY);
        if (Math.hypot(cx - x, cy - y) < 35) {
          score++;
          score_display.textContent = score;
          resetTimer();
          resetSound();
          hitSound.play();

          const speed = Math.sqrt(dx * dx + dy * dy) * 1.05;
          const angle = Math.random() * 2 * Math.PI;
          dx = speed * Math.cos(angle);
          dy = speed * Math.sin(angle);

          clicked = true;
          setTimeout(() => { clicked = false; }, 200);
        }
      }

      // touchstart → Treffer prüfen
      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        handleHit(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      // touchmove → nur blocken, keine Aktion
      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
      }, { passive: false });

      // Maus
      canvas.addEventListener("click", (e) => {
        handleHit(e.clientX, e.clientY);
      });

      document.getElementById("resetButton").addEventListener("click", () => {
        if (confirm("Bist du sicher, dass du den Highscore zurücksetzen möchtest?")) {
          localStorage.removeItem("alienHighscores");
          loadHighscores();
        }
      });

      document.getElementById("startButton").addEventListener("click", () => {
        score = 0;
        score_display.textContent = score;
        resetTimer();
        resetSound();
        resetSpeed();
        lastTimestamp = null;
        gameRunning = true;
        requestAnimationFrame(gameLoop);
      });

      function gameLoop(timestamp) {
        if (!gameRunning) return;

        // Delta berechnen: Zeit seit letztem Frame in Sekunden
        if (lastTimestamp === null) lastTimestamp = timestamp;
        const delta = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
        // max 50ms gecappt → bei Tab-Wechsel kein riesiger Sprung
        lastTimestamp = timestamp;

        drawAlien();
        updatePosition(delta);
        updateTimer(delta);
        requestAnimationFrame(gameLoop);
      }

      loadHighscores();
    </script>
  </body>
</html>
