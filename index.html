<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>RangeR Games</title>

  <link rel="icon" href="./images/ranger-high-resolution-logo-transparent_neu.ico" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <div class="container">

    <div class="text-center mb-4">

      <!-- Logo und Titel -->
      <img src="./images/ranger-high-resolution-logo-transparent_neu.png" alt="RangeR Games Logo">
      <h1 class="fw-bold mb-3">Willkommen bei Ranger Games</h1>

      <!-- Beschreibung -->
      <div class="intro-text mb-4 p-3 bg-gradient text-light rounded-3 shadow-lg mx-auto">
        <p>
          RangeR Games wächst stetig: eine Sammlung kniffliger, witziger Minigames, die immer wieder erweitert wird.
          Schau vorbei, probier dich aus und finde dein neues Lieblingsspiel.
        </p>
        <p>
          Wähle einfach eine Kachel unten aus und starte dein Abenteuer!
        </p>
      </div>
    </div>

    <!-- Spiele Grid -->
    <div class="row mt-4" id="gameGrid" class="game-grid">
      <!-- Kacheln werden per JavaScript erzeugt -->
    </div>

    <!-- Footer -->
    <footer>
      © 2025 RangeR Games
    </footer>
  </div>

  <script>
    // Liste der Spiele
    const games = [
      { folder: "catchthealien", title: "Catch the Alien", icon: "./catchthealien/images/space_alien.png" },
      { folder: "canyonflight", title: "Canyon Flight", icon: "./canyonflight/images/ranger-icon.svg" },
      { folder: "smake", title: "Smake", icon: "./smake/images/smake_icon.png" },
      { folder: "default", title: "Coming Soon...", icon: "./images/coming_soon_programmer.png" },
      // Beispiel: { folder: "snake", title: "Snake", icon: "./images/snake.png" }
    ];

    const gameGrid = document.getElementById("gameGrid");

    games.forEach(game => {
      const col = document.createElement("div");
      col.className = "col-md-4 mb-4";

      const card = document.createElement("div");
      card.className = "game-tile lightgray-bg";
      card.innerHTML = `
        <img src="${game.icon}" alt="${game.title}">
        <h2 class="fs-4">${game.title}</h2>
      `;

      card.addEventListener("click", () => {
        window.location.href = `${game.folder}/index.html`;
      });

      col.appendChild(card);
      gameGrid.appendChild(col);
    });
  </script>

</body>

</html>
